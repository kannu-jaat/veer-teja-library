apply plugin: 'com.android.application'

android {
    namespace "com.google.android.youtube.pro"  
    compileSdk 36

    defaultConfig {
        applicationId "com.krishna.library.student"
        minSdkVersion 21
        targetSdkVersion 36
        versionCode 1
        versionName "3.98"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    // Add your dependencies here
    implementation 'androidx.webkit:webkit:1.12.0'

    implementation 'androidx.cardview:cardview:1.0.0'
    // --- Firebase Dependencies Start ---
    // Firebase BoM (Yeh versions ko aapas me crash hone se bachata hai)
    implementation platform('com.google.firebase:firebase-bom:32.8.0')
    
    // Library App ke features ke liye packages
    implementation 'com.google.firebase:firebase-database'
    implementation 'com.google.firebase:firebase-messaging'
    // --- Firebase Dependencies End ---
}

// Yeh line hamesha file ke sabse aakhiri me honi chahiye
apply plugin: 'com.google.gms.google-services'
